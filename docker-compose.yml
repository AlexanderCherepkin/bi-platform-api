services:
  db:
    image: postgres:16-alpine
    container_name: bi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bi_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bi_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bi_dwh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bi_admin} -d ${POSTGRES_DB:-bi_dwh}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bi_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  metabase:
    image: metabase/metabase:latest
    container_name: bi_metabase
    restart: unless-stopped
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_app
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-bi_admin}
      MB_DB_PASS: ${POSTGRES_PASSWORD:-bi_secret}
      MB_DB_HOST: db
      MB_SITE_NAME: "Corp BI"
      MB_START_OF_WEEK: monday
    ports:
      - "3001:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - metabase_data:/metabase-data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: bi_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bi_admin}:${POSTGRES_PASSWORD:-bi_secret}@db:5432/${POSTGRES_DB:-bi_dwh}
      REDIS_URL: redis://redis:6379/0
      API_SECRET_KEY: ${API_SECRET_KEY:-change-me-in-production}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./api:/app
      - ./etl:/app/etl
      - /app/__pycache__

volumes:
  postgres_data:
  redis_data:
  metabase_data:

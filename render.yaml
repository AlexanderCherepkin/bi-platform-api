# Render Blueprint for BI Platform backend.
# Usage: connect this GitHub repo to Render, click "Blueprints" → "New Blueprint",
# and point to this file. Render will provision a free PostgreSQL database
# and a Docker web service for the FastAPI backend.
services:
  - type: web
    name: bi-platform-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile.prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bi-platform-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: API_SECRET_KEY
        generateValue: true
      - key: RUN_DB_INIT
        value: "1"
      - key: FORCE_REINIT
        value: "1"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "480"
    plan: free
    healthCheckPath: /health
    numInstances: 1

databases:
  - name: bi-platform-db
    plan: free
    databaseName: bi_dwh
    user: bi_admin
